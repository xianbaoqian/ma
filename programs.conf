# Multi-account program manifest. One line per program. '#' starts a comment.
#
# Format:   name | binary | VAR=dir pairs (space-separated)
#
#   name    the PROGRAM token used in folder names and on the command line
#   binary  the executable to exec (looked up on PATH)
#   VAR=dir each pair sets env var VAR to <account-folder>/dir when launching.
#           dir is the tool's real "~" name so the folder mirrors a home dir.
#
# To add a program: append one line. Nothing else to change.

claude   | claude   | CLAUDE_CONFIG_DIR=.claude
codex    | codex    | CODEX_HOME=.codex
kimi     | kimi     | KIMI_SHARE_DIR=.kimi
opencode | opencode | XDG_CONFIG_HOME=.config XDG_DATA_HOME=.local/share
